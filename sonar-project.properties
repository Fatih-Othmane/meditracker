sonar.projectKey=meditracker
sonar.sources=.
sonar.python.version=3
sonar.sourceEncoding=UTF-8

# Exclusions - CRITICAL
sonar.exclusions=**/venv/**,**/__pycache__/**,**/.git/**,**/tests/**,**/migrations/**,**/site-packages/**,**/.pyenv*/**,**/Lib/**,**/Python310/**,**/.pytest_cache/**,**/*.pyc

# CPD Exclusions
sonar.cpd.exclusions=**/tests/**,**/site-packages/**,**/.pyenv*/**,**/Lib/**

# Test exclusions
sonar.test.exclusions=**/tests/**,**/test_*.py

# Coverage exclusions
sonar.coverage.exclusions=**/tests/**,**/migrations/**